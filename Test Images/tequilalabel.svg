<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 500" width="350" height="500">
  <rect width="100%" height="100%" fill="#FAFAFA"/>
  <rect x="20" y="20" width="310" height="460" fill="none" stroke="#8B4513" stroke-width="4"/>
  
  <path d="M 175 50 L 185 80 L 175 90 L 165 80 Z" fill="#8FBC8F"/>
  
  <text x="175" y="130" font-family="Times New Roman, serif" font-size="34" font-weight="bold" fill="#8B4513" text-anchor="middle" letter-spacing="3">SOLARES</text>
  
  <text x="175" y="170" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#D2691E" text-anchor="middle">Reserva Especial</text>
  
  <text x="175" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2F4F4F" text-anchor="middle" letter-spacing="2">TEQUILA AÑEJO</text>
  <text x="175" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2F4F4F" text-anchor="middle" letter-spacing="1">100% DE AGAVE</text>
  
  <line x1="100" y1="280" x2="250" y2="280" stroke="#8B4513" stroke-width="1"/>
  
  <text x="175" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513" text-anchor="middle">40% ALC./VOL.  |  750 ML</text>
  
  <text x="175" y="355" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">IMPORTED AND BOTTLED BY SOLARES SPIRITS, AUSTIN, TX</text>
  <text x="175" y="370" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">PRODUCT OF MEXICO - NOM 1234 CRT</text>
  
  <text x="25" y="420" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#000000">GOVERNMENT WARNING:</text>
  <text x="140" y="420" font-family="Arial, sans-serif" font-size="8" fill="#000000">(1) According to the Surgeon General,</text>
  <text x="25" y="435" font-family="Arial, sans-serif" font-size="8" fill="#000000">women should not drink alcoholic beverages during pregnancy</text>
  <text x="25" y="450" font-family="Arial, sans-serif" font-size="8" fill="#000000">because of the risk of birth defects. (2) Consumption of</text>
  <text x="25" y="465" font-family="Arial, sans-serif" font-size="8" fill="#000000">alcoholic beverages impairs your ability to drive a car or</text>
  <text x="25" y="480" font-family="Arial, sans-serif" font-size="8" fill="#000000">operate machinery, and may cause health problems.</text>
</svg>
